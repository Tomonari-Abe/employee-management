<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員更新確認画面</title>
    <style>
        body {
            margin: 20px;
        }

        .confirm-row {
            margin-bottom: 12px;
        }

        .label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
        }

        .value {
            display: inline-block;
            min-width: 200px;
        }

        button {
            margin-top: 12px;
            padding: 6px 12px;
        }
    </style>
</head>
<body>
    <h1>社員更新確認画面</h1>

    <div class="confirm-row">
        <span class="label">姓</span>
        <span class="value" th:text="${confirmView.lastName}">姓</span>
    </div>

    <div class="confirm-row">
        <span class="label">名</span>
        <span class="value" th:text="${confirmView.firstName}">名</span>
    </div>

    <div class="confirm-row">
        <span class="label">生年月日</span>
        <span class="value" th:text="${confirmView.birthDate}">生年月日</span>
    </div>

    <div class="confirm-row">
        <span class="label">入社日</span>
        <span class="value" th:text="${confirmView.hireDate}">入社日</span>
    </div>

    <div class="confirm-row">
        <span class="label">所属部門</span>
        <span class="value" th:text="${confirmView.departmentName}">所属部門</span>
    </div>

    <button type="button" onclick="history.back()">戻る</button>

    <form th:action="@{/employees/update}" method="post" style="display:inline;">
        <input type="hidden" name="id" th:value="${confirmView.id}">
        <input type="hidden" name="lastName" th:value="${confirmView.lastName}">
        <input type="hidden" name="firstName" th:value="${confirmView.firstName}">
        <input type="hidden" name="birthDate" th:value="${confirmView.birthDate}">
        <input type="hidden" name="hireDate" th:value="${confirmView.hireDate}">
        <input type="hidden" name="departmentId" th:value="${confirmView.departmentId}">

        <button type="submit">更新</button>
    </form>
</body>
</html>
