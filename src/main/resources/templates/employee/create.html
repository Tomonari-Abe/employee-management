<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員登録</title>
    <style>
        body {
            margin: 20px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: inline-block;
            width: 100px;
        }

        input, select {
            padding: 6px;
            width: 200px;
        }

        button {
            margin-top: 12px;
            padding: 6px 12px;
        }
    </style>
</head>
<body>
    <h1>社員登録画面</h1>

    <form th:action="@{/employees/confirm}" method="post" th:object="${employeeForm}">
        <div class="form-group">
            <label>姓</label>
            <input type="text" th:field="*{lastName}">
        </div>

        <div class="form-group">
            <label>名</label>
            <input type="text" th:field="*{firstName}">
        </div>

        <div class="form-group">
            <label>生年月日</label>
            <input type="date" th:field="*{birthDate}">
        </div>

        <div class="form-group">
            <label>入社日</label>
            <input type="date" th:field="*{hireDate}">
        </div>

        <div class="form-group">
            <label>所属部門</label>
            <select th:field="*{departmentId}">
                <option value="">選択してください</option>
                <option th:each="dept : ${departments}"
                    th:value="${dept.id}"
                    th:text="${dept.departmentName}">
                </option>
            </select>
        </div>

        <button type="submit">確認</button>
    </form>
</body>
</html>
