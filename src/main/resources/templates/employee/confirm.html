<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員登録確認</title>
    <style>
        body {
            margin: 20px;
        }

        .confirm-row {
            margin-bottom: 12px;
        }

        .label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
        }

        .value {
            display: inline-block;
            min-width: 200px;
        }

        button {
            margin-top: 12px;
            padding: 6px 12px;
        }
    </style>
</head>
<body>
    <h1>社員登録確認画面</h1>

    <div class="confirm-row">
        <span class="label">姓</span>
        <span class="value" th:text="${confirmView.lastName}">姓</span>
    </div>

    <div class="confirm-row">
        <span class="label">名</span>
        <span class="value" th:text="${confirmView.firstName}">名</span>
    </div>

    <div class="confirm-row">
        <span class="label">生年月日</span>
        <span class="value" th:text="${confirmView.birthDate}">生年月日</span>
    </div>

    <div class="confirm-row">
        <span class="label">入社日</span>
        <span class="value" th:text="${confirmView.hireDate}">入社日</span>
    </div>

    <div class="confirm-row">
        <span class="label">所属部門</span>
        <span class="value" th:text="${confirmView.departmentName}">所属部門</span>
    </div>

    <button type="button" onclick="history.back()">戻る</button>
    <button type="button">登録</button>
</body>
</html>
